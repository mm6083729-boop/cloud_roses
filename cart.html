<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سلة المشتريات | غيمة وورد</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: Arial, sans-serif; background-color: #f9f9f9; padding: 20px; }
        .cart-container { max-width: 600px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #b84ed4; margin-top: 10px; }
        
        .back-home {
            display: inline-block;
            text-decoration: none;
            color: #b84ed4;
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 15px;
            transition: 0.2s;
        }
        .back-home:hover { color: #8e2ca7; }

        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .item-details { display: flex; flex-direction: column; gap: 4px; }
        .item-name { font-weight: bold; color: #333; }
        .item-price { color: #666; font-size: 0.9rem; }
        
        .quantity-controls { display: flex; align-items: center; gap: 10px; }
        .quantity-btn {
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 28px;
            height: 28px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .quantity-btn:hover { background-color: #e0e0e0; }
        .quantity-value { font-weight: bold; font-size: 1rem; min-width: 20px; text-align: center; }

        .total { font-weight: bold; font-size: 1.2rem; margin-top: 20px; text-align: left; color: #2c3e50; }
        
        .section-title { font-weight: bold; margin-bottom: 10px; color: #333; margin-top: 20px; display: block; border-right: 3px solid #b84ed4; padding-right: 10px; }
        textarea { width: 100%; height: 60px; padding: 10px; border: 1px solid #ccc; border-radius: 6px; resize: none; box-sizing: border-box; font-family: inherit; margin-bottom: 15px; }

        .datetime-picker { display: flex; gap: 15px; margin-bottom: 20px; }
        .datetime-field { flex: 1; }
        .datetime-picker input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; box-sizing: border-box; cursor: pointer; }

        .checkout-btn { display: block; width: 100%; background-color: #25D366; color: white; text-align: center; padding: 15px; border: none; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 25px; text-decoration: none; }
        .checkout-btn:hover { background-color: #20b857; }
        .clear-btn { display: block; width: 100%; background-color: #e74c3c; color: white; text-align: center; padding: 8px; border: none; border-radius: 6px; font-size: 0.9rem; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="cart-container">
    <a href="index.html" class="back-home">⬅️ العودة للرئيسية (تصفح الباقات)</a>

    <h2>سلة المشتريات 🛒</h2>
    
    <div id="cartItems"></div>
    
    <div class="total" id="cartTotal">الإجمالي: 0 ريال</div>

    <!-- قسم ملاحظات وتعديلات البوكيه (اختياري) -->
    <span class="section-title">✍️ ملاحظات وتعديلات خاصة بالبوكيه (اختياري):</span>
    <textarea id="customerNotes" placeholder="مثال: يرجى تغيير لون التغليف إلى أبيض، أو استبدال الورد الجوري بورد توليب..."></textarea>

    <!-- قسم تحديد موعد التوصيل (اختياري) -->
    <span class="section-title">📅 تحديد موعد التوصيل المستهدف (اختياري):</span>
    <div class="datetime-picker">
        <div class="datetime-field">
            <label style="font-size: 0.85rem; color: #666;" for="deliveryDate">اختر اليوم:</label>
            <!-- تم إزالة required -->
            <input type="date" id="deliveryDate">
        </div>
        <div class="datetime-field">
            <label style="font-size: 0.85rem; color: #666;" for="deliveryTime">اختر الوقت:</label>
            <!-- تم إزالة required -->
            <input type="time" id="deliveryTime">
        </div>
    </div>

    <button class="checkout-btn" onclick="sendToWhatsApp()">إرسال الطلب عبر الواتساب 💬</button>
    <button class="clear-btn" onclick="clearCart()">تفريغ السلة 🗑️</button>
</div>

<script>
function displayCart() {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    let cartItemsDiv = document.getElementById('cartItems');
    let cartTotalDiv = document.getElementById('cartTotal');
    
    if (cart.length === 0) {
        cartItemsDiv.innerHTML = '<p style="text-align:center; color:#777; padding: 20px 0;">السلة فارغة حالياً 🤷‍♂️</p>';
        cartTotalDiv.innerText = 'الإجمالي: 0 ريال';
        return;
    }
    
    let html = '';
    let total = 0;
    
    cart.forEach((item, index) => {
        let itemTotal = item.price * (item.quantity || 1);
        total += itemTotal;
        html += `
            <div class="cart-item">
                <div class="item-details">
                    <span class="item-name">${item.name}</span>
                    <span class="item-price">${itemTotal} ريال</span>
                </div>
                <div class="quantity-controls">
                    <button class="quantity-btn" onclick="changeQuantity(${index}, -1)">-</button>
                    <span class="quantity-value">${item.quantity || 1}</span>
                    <button class="quantity-btn" onclick="changeQuantity(${index}, 1)">+</button>
                </div>
            </div>
        `;
    });
    
    cartItemsDiv.innerHTML = html;
    cartTotalDiv.innerText = `الإجمالي: ${total} ريال`;
}

function changeQuantity(index, change) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    if (cart[index]) {
        cart[index].quantity = (cart[index].quantity || 1) + change;
        if (cart[index].quantity <= 0) {
            cart.splice(index, 1);
        }
        localStorage.setItem('cart', JSON.stringify(cart));
        displayCart();
    }
}

function clearCart() {
    localStorage.removeItem('cart');
    displayCart();
}

function sendToWhatsApp() {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    if (cart.length === 0) {
        alert('السلة فارغة! أضف بعض المنتجات أولاً من الرئيسية.');
        return;
    }
    
    let customerNotes = document.getElementById('customerNotes').value.trim();
    let deliveryDate = document.getElementById('deliveryDate').value;
    let deliveryTime = document.getElementById('deliveryTime').value;
    
    let message = "مرحباً *غيمة وورد*، أرغب في تأكيد طلب الباقات التالية:\n\n";
    let total = 0;
    
    cart.forEach((item, index) => {
        let itemTotal = item.price * (item.quantity || 1);
        total += itemTotal;
        message += `${index + 1}. *${item.name}* \n   الكمية: ${item.quantity || 1} \n   السعر: ${itemTotal} ريال\n\n`;
    });
    
    message += `*الإجمالي الكلي:* ${total} ريال\n`;
    message += `--------------------------------\n`;
    
    // فحص الموعد: إذا تم تحديده يرسل، وإذا تُرِك فارغاً يكتب "أقرب وقت" تلقائياً
    if (deliveryDate && deliveryTime) {
        message += `📅 *موعد التوصيل المطلوب:* \nالتاريخ: ${deliveryDate} \nالوقت: ${deliveryTime}\n\n`;
    } else {
        message += `📅 *موعد التوصيل المطلوب:* \nفي أقرب وقت ممكن ✨\n\n`;
    }
    
    if (customerNotes !== "") {
        message += `📝 *ملاحظات وتعديلات العميل:* \n${customerNotes}\n`;
    } else {
        message += `📝 *ملاحظات وتعديلات العميل:* لا توجد ملاحظات إضافية.\n`;
    }
    
    let encodedMessage = encodeURIComponent(message);
    let phoneNumber = "966501223800"; 
    window.open(`https://wa.me/${phoneNumber}?text=${encodedMessage}`, '_blank');
}

displayCart();
</script>
<script>
    // 1. تعريف المتغير الذي يحمل عدد المنتجات
    let cartTotal = 0;

    // 2. الدالة المسؤولة عن تحديث أيقونة السلة الموجودة عندك
    function updateCartCount() {
        cartTotal++; // زيادة العدد بواحد عند كل إضافة
        
        // ابحث عن العداد (span) داخل الأيقونة الموجودة عندك
        // تأكد أن الـ ID الخاص بالعداد في أيقونتك هو "cart-count"
        let cartCounter = document.getElementById('cart-count');
        
        if (cartCounter) {
            cartCounter.innerText = cartTotal;
            
            // تأثير جمالي بسيط (نبض الأيقونة)
            let cartIcon = document.getElementById('cart-icon');
            cartIcon.style.transform = "scale(1.2)";
            setTimeout(() => { cartIcon.style.transform = "scale(1)"; }, 200);
        }
        <span id="cart-count">0</span>
    }

</script>

</body>
</html>
